name: Deploy ML Service to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'ml-service/**'
      - '.github/workflows/deploy-ml-service.yml'
  workflow_dispatch:

env:
  REGISTRY: weaveracr.azurecr.io
  IMAGE_NAME: weaver-ml
  RESOURCE_GROUP: weaver-rg
  CONTAINER_APP: weaver-ml

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          file: ./ml-service/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Login to Azure CLI
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      
      - name: Verify deployment
        run: |
          ML_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          echo "ML Service URL: https://$ML_URL"
          
          # Wait for deployment to stabilize
          sleep 60
          
          # Health check
          curl -f https://$ML_URL/health || exit 1
          echo "✅ ML Service deployed and healthy!"
      
      - name: Update Backend ML Endpoint
        run: |
          ML_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          
          # Update backend environment variable to point to new ML service
          az containerapp update \
            --name weaver-backend \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars "AZURE_ML_ENDPOINT_URL=https://$ML_URL/classify"
          
          echo "✅ Backend updated to use ML Service at https://$ML_URL/classify"
